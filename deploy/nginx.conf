server {
    listen 80;
    root /opt/omnis/web/dist;
    index index.html;

    location /api/ {
        proxy_pass         http://127.0.0.1:8420;
        proxy_set_header   Host $host;
        proxy_buffering    off;   # SSE streaming
    }

    location / {
        try_files $uri $uri/ /index.html;  # SPA fallback
    }
}
